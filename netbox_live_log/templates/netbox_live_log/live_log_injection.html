<script type="text/javascript">
(function () {
    "use strict";

    // Guard against double-injection if the plugin is loaded twice for any
    // reason (multiple PluginTemplateExtension subclasses, etc.).
    if (window.__netbox_live_log_loaded) {
        return;
    }
    window.__netbox_live_log_loaded = true;

    const LEVEL_META = {
        debug:   { badge: "text-bg-secondary", icon: "mdi-message-outline",      label: "Debug" },
        info:    { badge: "text-bg-info",      icon: "mdi-information-outline",  label: "Info" },
        success: { badge: "text-bg-success",   icon: "mdi-check-circle-outline", label: "Success" },
        warning: { badge: "text-bg-warning",   icon: "mdi-alert-outline",        label: "Warning" },
        failure: { badge: "text-bg-danger",    icon: "mdi-close-circle-outline", label: "Failure" }
    };

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (ch) {
            return ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            })[ch];
        });
    }

    function init() {
        // URL guard — only run on a script results page. The id segment can
        // be either an integer PK or a UUID; the SSE view accepts either.
        const path = window.location.pathname;
        const match = path.match(/\/extras\/(?:scripts\/results|script-results)\/([^\/]+)\/?/);
        if (!match) {
            return;
        }
        const jobId = match[1];

        // Pick a stable insertion point. NetBox 4.5's script results page
        // wraps its log/output in a <div hx-get="..." hx-trigger="every 5s">
        // and lets HTMX replace its innerHTML every poll. Anything we insert
        // INSIDE that div (or inside the .htmx-container it renders) gets
        // wiped. We anchor on the polling div itself and insert as a sibling
        // BEFORE it, so HTMX never sees us.
        const pollingHost = document.querySelector("[hx-get]");
        const fallback = document.querySelector("main, .content-container, .container-fluid, body");
        const anchor = pollingHost || fallback;
        if (!anchor || !anchor.parentNode) {
            return;
        }

        // Build the live-log card.
        const card = document.createElement("div");
        card.id = "netbox-live-log-card";
        card.className = "card mb-3";
        card.innerHTML =
            '<h5 class="card-header d-flex align-items-center justify-content-between mb-0">' +
                '<span><i class="mdi mdi-broadcast me-1"></i>Live Log</span>' +
                '<span id="netbox-live-log-status" class="badge text-bg-secondary">Connecting&hellip;</span>' +
            '</h5>' +
            '<div id="netbox-live-log-scroll" class="table-responsive" style="max-height: 400px; overflow-y: auto;">' +
                '<table class="table table-hover table-sm mb-0">' +
                    '<thead>' +
                        '<tr>' +
                            '<th scope="col" style="width: 4rem;">#</th>' +
                            '<th scope="col" style="width: 2rem;"></th>' +
                            '<th scope="col" style="width: 8rem;">Level</th>' +
                            '<th scope="col">Message</th>' +
                        '</tr>' +
                    '</thead>' +
                    '<tbody id="netbox-live-log-body"></tbody>' +
                '</table>' +
            '</div>' +
            '<div id="netbox-live-log-empty" class="card-body text-muted small">' +
                'Waiting for the script to produce output&hellip;' +
            '</div>';

        if (pollingHost) {
            // Sibling-before the HTMX-polled element — outside its swap area.
            pollingHost.parentNode.insertBefore(card, pollingHost);
        } else {
            // No polling host on the page (e.g. completed jobs don't poll);
            // fall back to mounting at the top of the main content.
            anchor.insertBefore(card, anchor.firstChild);
        }

        const tbody = card.querySelector("#netbox-live-log-body");
        const empty = card.querySelector("#netbox-live-log-empty");
        const statusEl = card.querySelector("#netbox-live-log-status");
        const scrollEl = card.querySelector("#netbox-live-log-scroll");

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = "badge " + cls;
        }

        let rowIndex = 0;
        function appendRow(entry) {
            const level = (entry.level || "info").toLowerCase();
            const meta = LEVEL_META[level] || LEVEL_META.info;
            rowIndex += 1;

            const tr = document.createElement("tr");
            tr.className = "script-log-entry";
            tr.innerHTML =
                '<th scope="row">' + rowIndex + '</th>' +
                '<td><i class="mdi ' + meta.icon + '"></i></td>' +
                '<td><span class="badge ' + meta.badge + '">' + meta.label + '</span></td>' +
                '<td>' + escapeHtml(entry.message || "") + '</td>';
            tbody.appendChild(tr);

            if (empty && empty.parentNode) {
                empty.parentNode.removeChild(empty);
            }
            scrollEl.scrollTop = scrollEl.scrollHeight;
        }

        const streamUrl = "/plugins/live-log/stream/" + encodeURIComponent(jobId) + "/";
        let source;
        try {
            source = new EventSource(streamUrl);
        } catch (err) {
            setStatus("Unavailable", "text-bg-danger");
            return;
        }

        source.onmessage = function (event) {
            let data;
            try {
                data = JSON.parse(event.data);
            } catch (e) {
                return;
            }
            if (!data || typeof data !== "object") {
                return;
            }
            if (data.status === "connected") {
                setStatus("Streaming", "text-bg-success");
                return;
            }
            if (data.status === "done") {
                setStatus("Complete", "text-bg-secondary");
                source.close();
                return;
            }
            if (data.status === "timeout") {
                setStatus("Timed out", "text-bg-warning");
                source.close();
                return;
            }
            if (data.status === "error") {
                setStatus("Error", "text-bg-danger");
                return;
            }
            if (typeof data.message === "string") {
                appendRow(data);
            }
        };

        source.onerror = function () {
            if (source.readyState === EventSource.CLOSED) {
                return;
            }
            setStatus("Disconnected", "text-bg-warning");
            source.close();
        };

        window.addEventListener("beforeunload", function () {
            try { source.close(); } catch (e) { /* ignore */ }
        });
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
