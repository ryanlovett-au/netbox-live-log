<script type="text/javascript">
(function () {
    "use strict";

    // Guard against double-injection if the plugin is loaded twice for any
    // reason (multiple PluginTemplateExtension subclasses, etc.).
    if (window.__netbox_live_log_loaded) {
        return;
    }
    window.__netbox_live_log_loaded = true;

    // Level → badge color mapping. These class names mirror NetBox's
    // extras.choices.LogLevelChoices CHOICES tuple — using NetBox's own
    // color tokens (teal/cyan/green/yellow/red), not Bootstrap's
    // semantic ones (info/success/warning/danger).
    const LEVEL_META = {
        debug:   { badge: "text-bg-teal",   label: "Debug" },
        info:    { badge: "text-bg-cyan",   label: "Info" },
        success: { badge: "text-bg-green",  label: "Success" },
        warning: { badge: "text-bg-yellow", label: "Warning" },
        failure: { badge: "text-bg-red",    label: "Failure" }
    };

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (ch) {
            return ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            })[ch];
        });
    }

    // Format unix-epoch seconds to match the native Log table's
    // rendering: "YYYY-MM-DD HH:MM:SS" (second precision).
    function formatTimestamp(epoch) {
        const d = new Date(epoch * 1000);
        if (isNaN(d.getTime())) {
            return "";
        }
        const pad = (n) => String(n).padStart(2, "0");
        return d.getFullYear() + "-" +
               pad(d.getMonth() + 1) + "-" +
               pad(d.getDate()) + " " +
               pad(d.getHours()) + ":" +
               pad(d.getMinutes()) + ":" +
               pad(d.getSeconds());
    }

    function init() {
        // URL guard — only run on a script results page. The id segment can
        // be either an integer PK or a UUID; the SSE view accepts either.
        const path = window.location.pathname;
        const match = path.match(/\/extras\/(?:scripts\/results|script-results)\/([^\/]+)\/?/);
        if (!match) {
            return;
        }
        const jobId = match[1];

        // Pick a stable insertion point. NetBox 4.5's script results page
        // wraps its log/output in a <div hx-get="..." hx-trigger="every 5s">
        // whose innerHTML is wholesale replaced on every poll, so we mustn't
        // insert inside it. But NetBox also uses HTMX in the navbar/search,
        // so a bare [hx-get] selector grabs the wrong element.
        //
        // Strategy, in order of preference:
        //   1. Insert immediately before the existing "Log" card (the most
        //      semantic spot — directly above the log we're mirroring).
        //   2. Insert before the script-results polling div, matched by its
        //      hx-get URL pattern.
        //   3. Prepend to <main> as a last resort.
        function findAnchor() {
            // 1. Existing Log card, found by its card-header text.
            const headers = document.querySelectorAll(".card-header, h4, h5, h6");
            for (let i = 0; i < headers.length; i++) {
                const text = (headers[i].textContent || "").trim().toLowerCase();
                if (text === "log") {
                    const card = headers[i].closest(".card");
                    if (card && card.parentNode) {
                        return { node: card, mode: "before" };
                    }
                }
            }
            // 2. Script-results polling div, matched by URL fragment.
            const selectors = [
                '[hx-get*="script-result"]',
                '[hx-get*="script_result"]',
                '[hx-get*="scripts/results"]',
                '[hx-get*="script-results"]'
            ];
            for (let i = 0; i < selectors.length; i++) {
                const node = document.querySelector(selectors[i]);
                if (node && node.parentNode) {
                    return { node: node, mode: "before" };
                }
            }
            // 3. Prepend to a content container.
            const main = document.querySelector("main, .content-container, .container-fluid");
            if (main) {
                return { node: main, mode: "prepend" };
            }
            return null;
        }

        const anchor = findAnchor();
        if (!anchor) {
            return;
        }

        // Build the live-log card.
        const card = document.createElement("div");
        card.id = "netbox-live-log-card";
        card.className = "card mb-3";
        // Match the structure of NetBox's native Log card (extras/script_result):
        //  - <h5 class="card-header">  Log  </h5>
        //  - <table class="table table-hover object-list">
        //  - columns: Line / Time / Level / Object / Message
        card.innerHTML =
            '<h5 class="card-header d-flex align-items-center justify-content-between">' +
                '<span><i class="mdi mdi-broadcast me-1"></i>Live Log</span>' +
                '<span id="netbox-live-log-status" class="badge text-bg-secondary">Connecting&hellip;</span>' +
            '</h5>' +
            '<div id="netbox-live-log-scroll" class="table-responsive" style="max-height: 400px; overflow-y: auto;">' +
                '<table class="table table-hover object-list mb-0">' +
                    '<thead>' +
                        '<tr>' +
                            '<th scope="col">Line</th>' +
                            '<th scope="col">Time</th>' +
                            '<th scope="col">Level</th>' +
                            '<th scope="col">Object</th>' +
                            '<th scope="col">Message</th>' +
                        '</tr>' +
                    '</thead>' +
                    '<tbody id="netbox-live-log-body"></tbody>' +
                '</table>' +
            '</div>' +
            '<div id="netbox-live-log-empty" class="card-body text-muted small">' +
                'Waiting for the script to produce output&hellip;' +
            '</div>';

        if (anchor.mode === "before") {
            anchor.node.parentNode.insertBefore(card, anchor.node);
        } else if (anchor.mode === "prepend") {
            anchor.node.insertBefore(card, anchor.node.firstChild);
        } else {
            anchor.node.appendChild(card);
        }

        const tbody = card.querySelector("#netbox-live-log-body");
        const empty = card.querySelector("#netbox-live-log-empty");
        const statusEl = card.querySelector("#netbox-live-log-status");
        const scrollEl = card.querySelector("#netbox-live-log-scroll");

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = "badge " + cls;
        }

        let rowIndex = 0;
        function appendRow(entry) {
            const level = (entry.level || "info").toLowerCase();
            const meta = LEVEL_META[level] || LEVEL_META.info;
            const ts = typeof entry.timestamp === "number" ? formatTimestamp(entry.timestamp) : "";
            rowIndex += 1;

            const tr = document.createElement("tr");
            // django-tables2 zebra-stripes rows with even/odd classes;
            // the native log uses these, so match for visual parity.
            tr.className = rowIndex % 2 === 0 ? "even" : "odd";
            tr.innerHTML =
                '<td>' + rowIndex + '</td>' +
                '<td>' + escapeHtml(ts) + '</td>' +
                '<td><label class="badge ' + meta.badge + '">' + meta.label + '</label></td>' +
                '<td>&mdash;</td>' +
                '<td>' + escapeHtml(entry.message || "") + '</td>';
            tbody.appendChild(tr);

            if (empty && empty.parentNode) {
                empty.parentNode.removeChild(empty);
            }
            scrollEl.scrollTop = scrollEl.scrollHeight;
        }

        const streamUrl = "/plugins/live-log/stream/" + encodeURIComponent(jobId) + "/";
        let source;
        try {
            source = new EventSource(streamUrl);
        } catch (err) {
            setStatus("Unavailable", "text-bg-danger");
            return;
        }

        source.onmessage = function (event) {
            let data;
            try {
                data = JSON.parse(event.data);
            } catch (e) {
                return;
            }
            if (!data || typeof data !== "object") {
                return;
            }
            if (data.status === "connected") {
                setStatus("Streaming", "text-bg-success");
                return;
            }
            if (data.status === "done") {
                setStatus("Complete", "text-bg-secondary");
                source.close();
                return;
            }
            if (data.status === "timeout") {
                setStatus("Timed out", "text-bg-warning");
                source.close();
                return;
            }
            if (data.status === "error") {
                setStatus("Error", "text-bg-danger");
                return;
            }
            if (typeof data.message === "string") {
                appendRow(data);
            }
        };

        source.onerror = function () {
            if (source.readyState === EventSource.CLOSED) {
                return;
            }
            setStatus("Disconnected", "text-bg-warning");
            source.close();
        };

        window.addEventListener("beforeunload", function () {
            try { source.close(); } catch (e) { /* ignore */ }
        });
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
